name: Scratch Model CI

on:
  push:
    branches: [main, agent/second-brain-zero-english]
    paths:
      - "scratch/**"
      - "tests/test_scratch_model.py"
      - ".github/workflows/scratch-ci.yml"
  pull_request:
    paths:
      - "scratch/**"
      - "tests/test_scratch_model.py"
      - ".github/workflows/scratch-ci.yml"

jobs:
  test-scratch-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install scratch dependencies
        run: python -m pip install -r scratch/requirements.txt
      - name: Lint scratch model
        run: ruff check scratch tests/test_scratch_model.py
      - name: Test scratch model
        run: pytest -q tests/test_scratch_model.py
